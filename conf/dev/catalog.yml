#------------------------------
# Overrides base/catalog.yml
#------------------------------

# Sampling inputs
#---------------------
tbt_m14scope_delta:
  type: spark.SparkDataSet
  filepath: data/tbt/sampling/M14Scope
  file_format: parquet
  layer: sampling

# Sampling outputs
#---------------------
tbt_sampling_samples_sdf:
  type: spark.SparkDataSet
  filepath: data/tbt/sampling/sampling_samples_Riyadh.parquet
  file_format: parquet
  save_args:
    mode: append
  layer: sampling

tbt_sampling_metadata_sdf:
  type: spark.SparkDataSet
  filepath: data/tbt/sampling/sampling_metadata_Riyadh.parquet
  file_format: parquet
  save_args:
    mode: append
  layer: sampling

# Inspection inputs/outputs
#---------------------------
tbt_inspection_routes_input:
  type: spark.SparkDataSet
  filepath: data/tbt/inspection/inspection_routes.parquet
  file_format: parquet
  save_args:
    mode: append
  layer: inspection

tbt_critical_sections_with_mcp_feedback_input:
  type: spark.SparkDataSet
  filepath: data/tbt/inspection/critical_sections_with_mcp_feedback.parquet
  file_format: parquet
  save_args:
    mode: append
  layer: inspection

tbt_inspection_critical_sections_input:
  type: spark.SparkDataSet
  filepath: data/tbt/inspection/inspection_critical_sections.parquet
  file_format: parquet
  save_args:
    mode: append
  layer: inspection

tbt_inspection_metadata_input:
  type: spark.SparkDataSet
  filepath: data/tbt/inspection/inspection_metadata.parquet
  file_format: parquet
  save_args:
    mode: append
  layer: inspection

tbt_error_logs_output_spark:
  type: spark.SparkDataSet
  filepath: data/tbt/inspection/error_logs
  file_format: parquet
  save_args:
    mode: append
  layer: inspection

tbt_inspection_metadata_output_spark:
  type: spark.SparkDataSet
  filepath: data/tbt/inspection/inspection_metadata
  file_format: parquet
  save_args:
    mode: append
  layer: inspection

tbt_inspection_routes_output_spark:
  type: spark.SparkDataSet
  filepath: data/tbt/inspection/inspection_routes
  file_format: parquet
  save_args:
    mode: append
    partitionBy: [provider,country,sample_id,run_id]
  layer: inspection

tbt_critical_sections_with_mcp_feedback_output_spark:
  type: spark.SparkDataSet
  filepath: data/tbt/inspection/critical_sections_with_mcp_feedback
  file_format: parquet
  save_args:
    mode: append
    partitionBy: [run_id]
  layer: inspection

tbt_inspection_critical_sections_output_spark:
  type: spark.SparkDataSet
  filepath: data/tbt/inspection/inspection_critical_sections
  file_format: parquet
  save_args:
    mode: append
    partitionBy: [run_id]
  layer: inspection


tbt_critical_sections_with_model_predictions:
  type: spark.SparkDataSet
  filepath: data/tbt/inspection/critical_sections_with_model_predictions
  file_format: parquet
  save_args:
    mode: append
    partitionBy: [inspection_date]
  layer: inspection
  
# sql
