# Database outputs (pass-through datasets - actual export handled by export_to_database node)
tbt_inspection_routes_output_db:
  type: MemoryDataSet

tbt_inspection_critical_sections_output_db:
  type: MemoryDataSet

tbt_critical_sections_with_mcp_feedback_output_db:
  type: MemoryDataSet

tbt_error_logs_output_db:
  type: MemoryDataSet

tbt_inspection_metadata_output_db:
  type: MemoryDataSet

export_to_database_ok:
  type: MemoryDataSet

tbt_scheduled_metrics_output_spark:
  type: spark.SparkDataSet
  filepath: data/tbt/metric_calculation/scheduled_metrics
  file_format: parquet
  save_args:
    mode: append
  layer: metrics

tbt_scheduled_bootstrap_output_spark:
  type: spark.SparkDataSet
  filepath: data/tbt/metric_calculation/scheduled_bootstrap
  file_format: parquet
  save_args:
    mode: append
    partitionBy: [run_id]
  layer: metrics

tbt_scheduled_error_logs_history_output_spark:
  type: spark.SparkDataSet
  filepath: data/tbt/metric_calculation/scheduled_error_logs_history
  file_format: parquet
  save_args:
    mode: append
    partitionBy: [run_id]
  layer: metrics

tbt_scheduled_error_logs_history_output_sql:
  type: pandas.CSVDataSet
  filepath: data/tbt/inspection/scheduled_error_logs_history.csv
  load_args:
    sep: ","
    na_values: ["#NA", NA]
  save_args:
    index: False
    date_format: "%Y-%m-%d %H:%M"
    decimal: .
  
hdr_sampling_samples_df:
  type: pandas.CSVDataSet
  filepath: data/hdr/sampling/hdr_sampling.csv
 
hdr_sampling_metadata_df:
  type: pandas.CSVDataSet
  filepath: data/hdr/sampling/hdr_sampling_metadata.csv

hdr_sampling_extra_df:
  type: pandas.CSVDataSet
  filepath: data/hdr/sampling/hdr_sampling_extra.csv